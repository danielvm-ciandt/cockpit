services:
  - type: web
    name: cockpit
    runtime: node
    plan: free
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: cockpit
      - key: NEXTAUTH_SECRET
        sync: false
      - key: NEXTAUTH_URL
        value: "https://cockpit.onrender.com"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: NEON_AUTH_URL
        value: "https://ep-young-bonus-aju3kff5.neonauth.c-3.us-east-2.aws.neon.tech/neondb/auth"
      - key: NEON_AUTH_JWKS_URL
        value: "https://ep-young-bonus-aju3kff5.neonauth.c-3.us-east-2.aws.neon.tech/neondb/auth/.well-known/jwks.json"
    healthCheckPath: /
    headers:
      - http:
          - path: /
            name: Content-Type
            value: text/html
databases:
  - name: cockpit
    plan: free
    region: oregon
