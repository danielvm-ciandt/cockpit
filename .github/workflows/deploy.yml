name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '24'

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Run linter
        run: npm run lint --if-present || echo "No lint script configured"

  test:
    runs-on: ubuntu-latest
    name: Test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Run tests
        run: npm test --if-present || echo "No test script configured"

  build:
    runs-on: ubuntu-latest
    name: Build
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Install dependencies
        run: npm install --legacy-peer-deps
      - name: Build application
        run: npm run build
        env:
          NUXT_PUBLIC_SITE_URL: https://cockpit.onrender.com
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: .output
          retention-days: 5

  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Render
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Render
        run: |
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK }}" ]; then
            echo "Warning: RENDER_DEPLOY_HOOK not configured. Skipping Render deployment."
            echo "To enable: Add RENDER_DEPLOY_HOOK secret to GitHub repository settings."
          else
            curl "${{ secrets.RENDER_DEPLOY_HOOK }}" -X POST
          fi

  notify:
    runs-on: ubuntu-latest
    name: Notify Deployment
    needs: [deploy]
    if: always()
    steps:
      - name: Deployment Status
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployment successful!"
            echo "App is live at: https://cockpit.onrender.com"
          else
            echo "❌ Deployment failed. Check logs for details."
          fi
